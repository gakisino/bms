{% extends "base.html" %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
    <h2 style="color: #1e293b;">📋 Operadores</h2>
    <button onclick="abrirModalOp()" style="background: #4f46e5; color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold;">+ Novo Operador</button>
</div>

<div style="background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden;">
    <table style="width: 100%; border-collapse: collapse;">
        <thead style="background: #f8fafc; border-bottom: 2px solid #f1f5f9;">
            <tr>
                <th style="padding: 15px; text-align: left; width: 15%;">CÓDIGO</th>
                <th style="padding: 15px; text-align: left; width: 45%;">NOME</th>
                <th style="padding: 15px; text-align: left; width: 25%;">TELEFONE</th>
                <th style="padding: 15px; text-align: center; width: 15%;">AÇÕES</th>
            </tr>
        </thead>
        <tbody>
            {% for op in operadores %}
            <tr style="border-bottom: 1px solid #f1f5f9;">
                <td style="padding: 15px;">{{ op.codigo }}</td>
                <td style="padding: 15px; font-weight: 600;">{{ op.nome }}</td>
                <td style="padding: 15px;">{{ op.telefone }}</td>
                <td style="padding: 15px; text-align: center; display: flex; justify-content: center; gap: 15px;">
                    <button type="button" onclick="preencherEdicao('{{ op.id }}', '{{ op.nome }}', '{{ op.codigo }}', '{{ op.telefone }}', '{{ op.cpf }}', '{{ op.rg }}', '{{ op.nascimento }}', '{{ op.cidade }}', '{{ op.uf }}', '{{ op.endereco }}', '{{ op.pix }}', '{{ op.contato }}', '{{ op.telefone_contato }}')" style="color: #6366f1; background: none; border: none; cursor: pointer;">
                        <i data-lucide="edit-3" style="width: 18px;"></i>
                    </button>
                    <button type="button" onclick="abrirConfirmacaoGlobal('{{ url_for('deletar_operador', id=op.id) }}', 'Excluir Operador', 'Deseja excluir o operador <strong>{{ op.nome }}</strong>?')" style="color: #ef4444; background: none; border: none; cursor: pointer;">
                        <i data-lucide="trash-2" style="width: 18px;"></i>
                    </button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<div id="modalOp" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
    <div style="background: white; width: 95%; max-width: 700px; border-radius: 20px; padding: 25px; max-height: 85vh; overflow-y: auto;">
        <h2 id="modalTitle" style="margin-bottom: 20px;">Novo Operador</h2>
        <form id="formOp" method="POST">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div style="grid-column: span 2;"><label class="label-form">Nome Completo</label><input type="text" name="nome" id="f_nome" required class="input-form"></div>
                <div><label class="label-form">Código</label><input type="text" name="codigo" id="f_codigo" required class="input-form"></div>
                <div><label class="label-form">Telefone</label><input type="text" name="telefone" id="f_telefone" class="input-form"></div>
                <div><label class="label-form">CPF</label><input type="text" name="cpf" id="f_cpf" class="input-form"></div>
                <div><label class="label-form">RG</label><input type="text" name="rg" id="f_rg" class="input-form"></div>
                <div><label class="label-form">Nascimento</label><input type="date" name="nascimento" id="f_nascimento" class="input-form"></div>
                <div><label class="label-form">Cidade</label><input type="text" name="cidade" id="f_cidade" class="input-form"></div>
                <div><label class="label-form">UF</label><input type="text" name="uf" id="f_uf" maxlength="2" class="input-form"></div>
                <div style="grid-column: span 2;"><label class="label-form">Endereço</label><input type="text" name="endereco" id="f_endereco" class="input-form"></div>
                <div><label class="label-form">PIX</label><input type="text" name="pix" id="f_pix" class="input-form"></div>
                <div><label class="label-form">Contato</label><input type="text" name="contato" id="f_contato" class="input-form"></div>
                <div><label class="label-form">Tel. Contato</label><input type="text" name="telefone_contato" id="f_telcontato" class="input-form"></div>
            </div>
            <div style="margin-top: 25px; display: flex; gap: 10px;">
                <button type="button" onclick="document.getElementById('modalOp').style.display='none'" style="flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #ddd;">Cancelar</button>
                <button type="submit" style="flex: 1; padding: 12px; border-radius: 10px; background: #4f46e5; color: white; border: none; font-weight: bold;">Gravar</button>
            </div>
        </form>
    </div>
</div>

<script>
    function abrirModalOp() {
        document.getElementById('modalTitle').innerText = "Novo Operador";
        document.getElementById('formOp').action = "{{ url_for('operadores') }}";
        document.getElementById('formOp').reset();
        document.getElementById('modalOp').style.display = 'flex';
    }
    function preencherEdicao(id, nome, codigo, tel, cpf, rg, nasc, cid, uf, end, pix, cont, telc) {
        document.getElementById('modalTitle').innerText = "Editar Operador";
        document.getElementById('formOp').action = "/operadores/editar/" + id;
        document.getElementById('f_nome').value = nome;
        document.getElementById('f_codigo').value = codigo;
        document.getElementById('f_telefone').value = tel;
        document.getElementById('f_cpf').value = cpf;
        document.getElementById('f_rg').value = rg;
        document.getElementById('f_nascimento').value = nasc;
        document.getElementById('f_cidade').value = cid;
        document.getElementById('f_uf').value = uf;
        document.getElementById('f_endereco').value = end;
        document.getElementById('f_pix').value = pix;
        document.getElementById('f_contato').value = cont;
        document.getElementById('f_telcontato').value = telc;
        document.getElementById('modalOp').style.display = 'flex';
    }
</script>
{% endblock %}
