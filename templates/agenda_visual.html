{% extends "base.html" %}

{% block content %}
<div style="margin-bottom: 25px;">
    <h2 style="color: #1e293b; font-weight: 700;">📅 Agendamento de Visitas</h2>
</div>

<!-- SELEÇÃO DE UNIDADE E DATA -->
<div style="background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 20px; margin-bottom: 25px; border: 1px solid #f1f5f9;">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: flex-end;">
        <div>
            <label class="label-form" style="display: block; margin-bottom: 8px;">Unidade *</label>
            <select id="selectUnidade" class="input-form" style="width: 100%; background: white; color: #1e293b;">
                <option value="">— Selecione uma unidade —</option>
                {% for u in unidades %}
                <option value="{{ u.id }}" data-intervalo="{{ u.intervalo }}" data-cor-bg="{{ u.cor_bg or '#e0e7ff' }}" data-cor-texto="{{ u.cor_texto or '#4f46e5' }}" data-sigla="{{ u.sigla }}">{{ u.sigla }} - {{ u.nome }}</option>
                {% endfor %}
            </select>
        </div>

        <div style="display: flex; gap: 10px; align-items: flex-end;">
            <button type="button" onclick="mudarData(-1)" style="padding: 10px 15px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 8px; cursor: pointer; font-weight: 600;">
                ← Anterior
            </button>
            <div style="flex: 1; display: flex; align-items: flex-end; gap: 8px;">
                <input type="date" id="selectData" class="input-form" style="text-align: center; flex: 1;">
                <span id="diaSemanaLabel" style="font-size: 12px; color: #94a3b8; font-weight: 600; white-space: nowrap; padding-bottom: 12px;">Selecione</span>
            </div>
            <button type="button" onclick="mudarData(1)" style="padding: 10px 15px; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 8px; cursor: pointer; font-weight: 600;">
                Próximo →
            </button>
        </div>
    </div>
</div>

<!-- GRID DE HORÁRIOS -->
<div style="background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 20px; border: 1px solid #f1f5f9;">
    <div id="gradeHorarios" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px;">
        <div style="padding: 40px 20px; text-align: center; color: #94a3b8; grid-column: 1/-1;">
            Selecione uma unidade para ver os horários disponíveis
        </div>
    </div>
</div>

<!-- LEGENDA -->
<div style="display: flex; gap: 30px; margin-top: 20px; padding: 15px; background: #f8fafc; border-radius: 10px;">
    <div style="display: flex; align-items: center; gap: 10px;">
        <div style="width: 20px; height: 20px; background: #10b981; border-radius: 6px;"></div>
        <span style="color: #64748b; font-size: 14px;">Livre</span>
    </div>
    <div style="display: flex; align-items: center; gap: 10px;">
        <div style="width: 20px; height: 20px; background: #f59e0b; border-radius: 6px;"></div>
        <span style="color: #64748b; font-size: 14px;">Parcialmente ocupado</span>
    </div>
    <div style="display: flex; align-items: center; gap: 10px;">
        <div style="width: 20px; height: 20px; background: #ef4444; border-radius: 6px;"></div>
        <span style="color: #64748b; font-size: 14px;">Ocupado</span>
    </div>
    <div style="display: flex; align-items: center; gap: 10px;">
        <div style="width: 20px; height: 20px; background: #6b7280; border-radius: 6px;"></div>
        <span style="color: #64748b; font-size: 14px;">Bloqueado</span>
    </div>
</div>

<!-- MODAL DE CONFIRMAÇÃO DE AGENDAMENTO -->
<div id="modalConfirmacaoAgendamento" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 10001; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
    <div style="background: white; width: 90%; max-width: 400px; border-radius: 16px; padding: 30px; text-align: center;">
        <div style="background: #dbeafe; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
            <i data-lucide="calendar-check" style="color: #0284c7; width: 30px;"></i>
        </div>
        <h3 id="tituloConfirmacaoAgendamento" style="margin-bottom: 10px; color: #1e293b; font-weight: 700;">Confirmar Agendamento</h3>
        <p id="mensagemConfirmacaoAgendamento" style="color: #64748b; margin-bottom: 25px; line-height: 1.5; font-size: 14px;"></p>
        <div style="display: flex; gap: 10px;">
            <button type="button" onclick="fecharConfirmacaoAgendamento()" style="flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #ddd; background: white; cursor: pointer; font-weight: 600; color: #64748b;">Cancelar</button>
            <button type="button" onclick="submeterFormularioAgendamento()" style="flex: 1; padding: 12px; border-radius: 10px; background: #0284c7; color: white; text-decoration: none; font-weight: bold; cursor: pointer; border: none;">Confirmar</button>
        </div>
    </div>
</div>

<!-- MODAL DE AGENDAMENTO -->
<div id="modalAgendamento" style="display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.7); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
    <div style="background: white; width: 95%; max-width: 600px; border-radius: 20px; padding: 30px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);">
        <h2 style="color:#1e293b; font-weight:700; margin-bottom: 20px;">Novo Agendamento</h2>

        <div id="erroValidacao" style="display: none; background: #fee2e2; border: 1px solid #fecaca; color: #dc2626; padding: 12px 15px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; display: flex; align-items: center; gap: 10px;">
            <i data-lucide="alert-circle" style="width: 20px; height: 20px;"></i>
            <span id="textoErro"></span>
        </div>

        <form id="formAgendamento" method="POST" action="/agendamento/salvar" onsubmit="confirmarAgendamento(event)">
            <input type="hidden" name="redirect_url" value="/agenda_visual">
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">

                <div>
                    <label class="label-form">Unidade</label>
                    <input type="text" id="modalUnidade" disabled class="input-form" style="background: #f1f5f9;">
                    <input type="hidden" name="unidade_id" id="modalUnidadeId">
                </div>

                <div>
                    <label class="label-form">Data</label>
                    <input type="text" id="modalData" disabled class="input-form" style="background: #f1f5f9;">
                    <input type="hidden" name="data" id="modalDataHidden">
                </div>

                <div>
                    <label class="label-form">Horário</label>
                    <input type="text" id="modalHora" disabled class="input-form" style="background: #f1f5f9;">
                    <input type="hidden" name="hora" id="modalHoraHidden">
                </div>

                <div style="grid-column: 1/4;">
                    <label class="label-form">Nome do Aluno *</label>
                    <input type="text" name="nome" id="f_nome" required class="input-form" placeholder="Nome completo">
                </div>

                <div>
                    <label class="label-form">Telefone *</label>
                    <input type="text" name="telefone" id="f_telefone" required class="input-form" placeholder="(00) 00000-0000" maxlength="15" oninput="mascaraTelefonAgendaVisual(event)">
                </div>

                <div>
                    <label class="label-form">Idade</label>
                    <input type="number" name="idade" id="f_idade" class="input-form" placeholder="Ex: 15" min="7" max="68">
                </div>

                <div style="grid-column: 1/4;">
                    <label class="label-form">Responsável</label>
                    <input type="text" name="responsavel" id="f_responsavel" class="input-form" placeholder="Nome do responsável">
                </div>

                <div style="grid-column: 1/4;">
                    <label class="label-form">Operador Responsável *</label>
                    <select name="id_operadores" id="f_operador" required class="input-form" style="width: 100%; background: white; color: #1e293b;">
                        <option value="">— Selecione um operador —</option>
                        {% for o in operadores %}
                        <option value="{{ o.id }}">{{ o.nome }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div style="grid-column: 1/4;">
                    <label class="label-form">Observação</label>
                    <textarea name="observacao" id="f_observacao" class="input-form" style="resize: vertical; min-height: 80px;" placeholder="Informações adicionais..."></textarea>
                </div>

            </div>

            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 25px;">
                <button type="button" onclick="fecharModalAgendamento()" style="padding:10px 20px; background:#f1f5f9; color:#64748b; border:1px solid #e2e8f0; border-radius:10px; cursor:pointer; font-weight:600; display:flex; flex-direction:column; align-items:center; gap:2px; line-height:1.2;">
                    <span>Cancelar</span>
                    <span style="font-size:10px; opacity:0.7;">(esc)</span>
                </button>
                <button type="submit" style="padding:10px 20px; background:#6366f1; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:600; display:flex; flex-direction:column; align-items:center; gap:2px; line-height:1.2;">
                    <span>Agendar</span>
                    <span style="font-size:10px; opacity:0.9;">(alt + i)</span>
                </button>
            </div>
        </form>
    </div>
</div>

<script>
let unidadeSelecionada = null;

function atualizarBadgeUnidade() {
    const selectUnidade = document.getElementById('selectUnidade');
    const selectedValue = selectUnidade.value;

    if (!selectedValue) {
        selectUnidade.style.background = 'white';
        selectUnidade.style.color = '#1e293b';
        return;
    }

    const option = selectUnidade.querySelector(`option[value="${selectedValue}"]`);
    if (option) {
        const corBg = option.dataset.corBg || '#e0e7ff';
        const corTexto = option.dataset.corTexto || '#4f46e5';
        selectUnidade.style.background = corBg;
        selectUnidade.style.color = corTexto;
    }
}

// Carregar data padrão
document.getElementById('selectData').valueAsDate = new Date();

// Evento ao selecionar unidade
document.getElementById('selectUnidade').addEventListener('change', function() {
    atualizarBadgeUnidade();
    carregarHorarios();
});

// Aplicar cores iniciais quando página carrega
atualizarBadgeUnidade();

// Função para atualizar o dia da semana
function atualizarDiaSemana() {
    const dataInput = document.getElementById('selectData');
    const labelDia = document.getElementById('diaSemanaLabel');
    const valor = dataInput.value;

    if (!valor) {
        labelDia.textContent = 'Selecione';
        return;
    }

    // Criar data de forma correta para evitar problemas de timezone
    const [ano, mes, dia] = valor.split('-');
    const data = new Date(ano, mes - 1, dia);

    const diasSemana = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
    const nomeDia = diasSemana[data.getDay()];

    labelDia.textContent = nomeDia;
}

// Evento ao mudar data
document.getElementById('selectData').addEventListener('change', function() {
    atualizarDiaSemana();
    carregarHorarios();
});

// Atualizar dia da semana na inicialização
atualizarDiaSemana();

function carregarHorarios() {
    const unidadeId = document.getElementById('selectUnidade').value;
    const data = document.getElementById('selectData').value;

    if (!unidadeId || !data) {
        document.getElementById('gradeHorarios').innerHTML = '<div style="padding: 40px 20px; text-align: center; color: #94a3b8; grid-column: 1/-1;">Selecione unidade e data</div>';
        return;
    }

    unidadeSelecionada = unidadeId;

    fetch(`/api/horarios?unidade_id=${unidadeId}&data=${data}`)
        .then(r => r.json())
        .then(data => {
            const grade = document.getElementById('gradeHorarios');
            grade.innerHTML = '';

            if (!data.horarios || data.horarios.length === 0) {
                grade.innerHTML = '<div style="padding: 40px 20px; text-align: center; color: #94a3b8; grid-column: 1/-1;">Nenhum horário disponível</div>';
                return;
            }

            data.horarios.forEach(slot => {
                const div = document.createElement('div');
                div.style.cssText = `
                    padding: 15px;
                    border-radius: 10px;
                    text-align: center;
                    cursor: pointer;
                    transition: 0.2s;
                    border: 2px solid;
                    user-select: none;
                `;

                let background, cor, texto;

                if (slot.status === 'livre') {
                    background = '#d1fae5';
                    cor = '#059669';
                    texto = slot.hora;
                } else if (slot.status === 'bloqueado') {
                    background = '#e5e7eb';
                    cor = '#4b5563';
                    texto = `${slot.hora}\n🚫 ${slot.motivo || 'Bloqueado'}`;
                    div.style.cursor = 'not-allowed';
                } else {
                    // Ocupado
                    background = slot.agendamentos >= 2 ? '#fee2e2' : '#fef3c7';
                    cor = slot.agendamentos >= 2 ? '#dc2626' : '#d97706';
                    texto = `${slot.hora}\n${slot.cliente_nome}\n${slot.cliente_telefone}`;
                }

                div.style.background = background;
                div.style.color = cor;
                div.style.borderColor = cor;
                div.style.fontWeight = '600';
                div.style.whiteSpace = 'pre-wrap';
                div.style.fontSize = '12px';
                div.innerHTML = texto;

                if (slot.status !== 'bloqueado') {
                    div.ondblclick = () => abrirModalAgendamento(slot.hora);
                    div.onmouseover = () => div.style.opacity = '0.8';
                    div.onmouseout = () => div.style.opacity = '1';
                }

                grade.appendChild(div);
            });
        })
        .catch(e => {
            console.error(e);
            document.getElementById('gradeHorarios').innerHTML = '<div style="padding: 40px 20px; text-align: center; color: #ef4444; grid-column: 1/-1;">Erro ao carregar horários</div>';
        });
}

function mudarData(dias) {
    const input = document.getElementById('selectData');
    const data = new Date(input.valueAsDate);
    data.setDate(data.getDate() + dias);
    input.valueAsDate = data;
    atualizarDiaSemana();
    carregarHorarios();
}

function mascaraTelefonAgendaVisual(e) {
    let input = e.target;
    let valor = input.value.replace(/\D/g, '');

    if (valor.length > 11) valor = valor.slice(0, 11);

    if (valor.length > 7) {
        valor = '(' + valor.slice(0, 2) + ') ' + valor.slice(2, 7) + '-' + valor.slice(7);
    } else if (valor.length > 2) {
        valor = '(' + valor.slice(0, 2) + ') ' + valor.slice(2);
    } else if (valor.length > 0) {
        valor = '(' + valor;
    }

    input.value = valor;
}

function abrirModalAgendamento(hora) {
    const unidadeId = document.getElementById('selectUnidade').value;
    const unidadeText = document.getElementById('selectUnidade').options[document.getElementById('selectUnidade').selectedIndex].text;
    const data = document.getElementById('selectData').value;

    // Converter data YYYY-MM-DD para dd/mm/yyyy
    const [ano, mes, dia] = data.split('-');
    const dataFormatada = `${dia}/${mes}/${ano}`;

    document.getElementById('modalUnidade').value = unidadeText;
    document.getElementById('modalUnidadeId').value = unidadeId;
    document.getElementById('modalData').value = dataFormatada;
    document.getElementById('modalDataHidden').value = data;
    document.getElementById('modalHora').value = hora;
    document.getElementById('modalHoraHidden').value = hora;

    document.getElementById('f_nome').value = '';
    document.getElementById('f_telefone').value = '';
    document.getElementById('f_idade').value = '';
    document.getElementById('f_responsavel').value = '';
    document.getElementById('f_operador').value = '{{ operador_usuario or "" }}';
    document.getElementById('f_observacao').value = '';

    limparErroValidacao();
    document.getElementById('modalAgendamento').style.display = 'flex';
}

function mostraErroValidacao(mensagem, campoId) {
    document.getElementById('textoErro').innerText = mensagem;
    document.getElementById('erroValidacao').style.display = 'flex';
    document.getElementById(campoId).focus();
    document.getElementById(campoId).style.borderColor = '#ef4444';
}

function limparErroValidacao() {
    document.getElementById('erroValidacao').style.display = 'none';
    document.getElementById('textoErro').innerText = '';
    document.querySelectorAll('[id^="f_"]').forEach(el => {
        el.style.borderColor = '';
    });
}

function confirmarAgendamento(event) {
    event.preventDefault();

    const nomeAluno = document.getElementById('f_nome').value.trim();
    const telefone = document.getElementById('f_telefone').value.trim();
    const operador = document.getElementById('f_operador').value.trim();
    const data = document.getElementById('modalData').value;
    const hora = document.getElementById('modalHora').value;
    const unidade = document.getElementById('modalUnidade').value;

    // Validações
    if (!nomeAluno) {
        mostraErroValidacao('Nome do aluno é obrigatório', 'f_nome');
        return;
    }

    if (!telefone) {
        mostraErroValidacao('Telefone é obrigatório', 'f_telefone');
        return;
    }

    if (!operador) {
        mostraErroValidacao('Operador responsável é obrigatório', 'f_operador');
        return;
    }

    limparErroValidacao();
    const mensagem = `Agendamento para <strong>${data}</strong> às <strong>${hora}</strong><br>Aluno: <strong>${nomeAluno}</strong><br>Unidade: <strong>${unidade}</strong>`;

    document.getElementById('tituloConfirmacaoAgendamento').innerText = 'Confirmar Agendamento';
    document.getElementById('mensagemConfirmacaoAgendamento').innerHTML = mensagem;
    document.getElementById('modalConfirmacaoAgendamento').style.display = 'flex';
}

function fecharConfirmacaoAgendamento() {
    document.getElementById('modalConfirmacaoAgendamento').style.display = 'none';
}

function submeterFormularioAgendamento() {
    fecharConfirmacaoAgendamento();
    document.getElementById('formAgendamento').submit();
}

function fecharModalAgendamento() {
    document.getElementById('modalAgendamento').style.display = 'none';
}

// Fechar modal ao clicar fora
document.getElementById('modalAgendamento').addEventListener('click', function(e) {
    if (e.target === this) fecharModalAgendamento();
});

// Fechar modal de confirmação ao clicar fora
document.getElementById('modalConfirmacaoAgendamento').addEventListener('click', function(e) {
    if (e.target === this) fecharConfirmacaoAgendamento();
});

// Atalho Alt+I para agendar
document.addEventListener('keydown', function(event) {
    if (event.altKey && event.key.toLowerCase() === 'i') {
        if (document.getElementById('modalAgendamento').style.display === 'flex') {
            event.preventDefault();
            document.getElementById('formAgendamento').dispatchEvent(new Event('submit'));
        }
    }
});

// Atalho Esc para cancelar
document.addEventListener('keydown', function(event) {
    if (event.key === 'Escape') {
        if (document.getElementById('modalAgendamento').style.display === 'flex') {
            event.preventDefault();
            fecharModalAgendamento();
        }
    }
});
</script>

{% endblock %}
